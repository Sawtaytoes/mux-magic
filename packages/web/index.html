<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mux Magic</title>
    <style>
      /* Prevents a white flash before the bundled CSS (tailwindStyles.css)
         loads. Keep in sync with the body rule there. */
      html, body { background-color: #0f172a; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Loads window.getCommandFieldDescription / getCommandSummary /
      commandDescriptions, all generated at prebuild time from the
      .describe(...) calls in src/api/schemas.ts. Must load BEFORE the
      React bundle so CommandFieldEntry and FieldTooltip can read it.
      Source: packages/api/scripts/build-command-descriptions.ts.
    -->
    <script src="/command-descriptions.js"></script>
    <script type="module" src="/src/app.tsx"></script>
  </body>
</html>
