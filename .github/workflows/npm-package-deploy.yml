name: NPM Package Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false  # never use caching in release builds
      - run: corepack enable
      - run: yarn install --immutable

      # Publish @mux-magic/tools only when its version was bumped this push.
      # "Was it bumped?" == "does a `tools-v<version>` tag already exist for the
      # version in package.json?". If the tag exists, this version is already
      # released — skip (no failed job). If not, publish and create the tag.
      #
      # Bumping the version is a manual step done in the PR (see
      # docs/agents/npm-publishing.md). CI never edits package.json or pushes a
      # commit — master is protected by a ruleset requiring pull requests — it
      # only pushes the lightweight `tools-v<version>` tag, which the branch
      # ruleset does not cover.
      - name: Publish @mux-magic/tools if its version was bumped
        run: |
          set -euo pipefail
          PKG_DIR="packages/tools"

          version="$(node -p "require('./$PKG_DIR/package.json').version")"
          tag="tools-v${version}"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists — @mux-magic/tools@${version} is already released. Skipping."
            exit 0
          fi

          echo "No ${tag} tag yet — publishing @mux-magic/tools@${version}."
          ( cd "$PKG_DIR" && npm publish --provenance --access public )

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"
          echo "Published and tagged ${tag}."
