name: Docker Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches:
      - master
      - "feat/**"
    types: [completed]

# Group by the branch that actually ran CI, not github.ref — under a
# workflow_run trigger github.ref is always the default branch, which
# would lump every feat/** deploy into one queue with master.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@master
        with:
          # workflow_run's github.sha resolves to the DEFAULT branch (master),
          # not the branch that ran CI — so building feat/** here used to
          # produce a feat-tagged image containing master's code. Use the
          # triggering run's head_sha so the image matches its tag.
          ref: "${{ github.event.workflow_run.head_sha || github.sha }}"

      - name: Log in to GitHub Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: corepack enable && yarn install --immutable

      - name: Build @mux-magic/tools
        # generate:schemas-ci runs under tsx, which resolves bare
        # `@mux-magic/tools` imports via the package's "default" export
        # (./dist/index.js) — tsx doesn't claim the "source" condition
        # that Vite/vitest use. Without this step the next command dies
        # with ERR_MODULE_NOT_FOUND on the first `import "@mux-magic/tools"`.
        # Mirrors the unit-tests / e2e / typecheck jobs in ci.yml.
        run: yarn build:tools

      - name: Generate OpenAPI schemas
        run: yarn generate:schemas-ci

      - name: Capture build time
        id: meta
        run: echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Compute branch tag
        id: tags
        run: |
          branch_tag="${{ github.event.workflow_run.head_branch }}"
          branch_tag="${branch_tag//\//-}"
          echo "branch_tag=${branch_tag}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            GIT_SHA=${{ github.event.workflow_run.head_sha || github.sha }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          tags: |
            ghcr.io/sawtaytoes/mux-magic:${{ github.event.workflow_run.head_sha || github.sha }}
            ghcr.io/sawtaytoes/mux-magic:${{ steps.tags.outputs.branch_tag }}
            ${{ github.event.workflow_run.head_branch == 'master' && 'ghcr.io/sawtaytoes/mux-magic:latest' || '' }}
