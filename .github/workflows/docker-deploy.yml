name: Docker Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@master
        with:
          ref: "${{ github.sha }}"

      - name: Log in to GitHub Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: corepack enable && yarn install --immutable

      - name: Generate OpenAPI schemas
        run: yarn generate:schemas-ci

      - name: Capture build time
        id: meta
        run: echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          tags: |
            ghcr.io/sawtaytoes/mux-magic:latest
            ghcr.io/sawtaytoes/mux-magic:${{ github.sha }}
            ghcr.io/sawtaytoes/mux-magic:${{ github.ref_name }}
